name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'

      - name: Install dependencies
        run: brew install sqlite3

      - name: Configure
        run: |
          cd native
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build native/build --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Tests (507 tests must pass)
        run: |
          cmake --build native/build --target test_all --config Release -j$(sysctl -n hw.ncpu)
          cmake --build native/build --target test_regression --config Release -j$(sysctl -n hw.ncpu)
          cd native/build && ./test_all && ./test_regression

      - name: Install
        run: cmake --install native/build --prefix native/install

      - name: Bundle Qt frameworks
        run: macdeployqt native/install/NativeSpreadsheet.app || true

      - name: Code sign
        run: codesign --force --deep -s - native/install/NativeSpreadsheet.app

      - name: Verify signature
        run: codesign --verify --deep --strict native/install/NativeSpreadsheet.app

      - name: Create DMG
        run: |
          rm -rf /tmp/nexel-dmg
          mkdir -p /tmp/nexel-dmg
          cp -R "native/install/NativeSpreadsheet.app" "/tmp/nexel-dmg/Nexel Pro.app"
          ln -s /Applications /tmp/nexel-dmg/Applications
          hdiutil create -volname "Nexel Pro" \
            -srcfolder /tmp/nexel-dmg \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            Nexel-${{ github.ref_name }}-macOS-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-macOS-arm64
          path: Nexel-*.dmg

  build-macos-x64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'

      - name: Install dependencies
        run: brew install sqlite3

      - name: Configure
        run: |
          cd native
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build
        run: cmake --build native/build --config Release -j$(sysctl -n hw.ncpu)

      - name: Install
        run: cmake --install native/build --prefix native/install

      - name: Bundle Qt frameworks
        run: macdeployqt native/install/NativeSpreadsheet.app || true

      - name: Code sign
        run: codesign --force --deep -s - native/install/NativeSpreadsheet.app

      - name: Verify signature
        run: codesign --verify --deep --strict native/install/NativeSpreadsheet.app

      - name: Create DMG
        run: |
          rm -rf /tmp/nexel-dmg
          mkdir -p /tmp/nexel-dmg
          cp -R "native/install/NativeSpreadsheet.app" "/tmp/nexel-dmg/Nexel Pro.app"
          ln -s /Applications /tmp/nexel-dmg/Applications
          hdiutil create -volname "Nexel Pro" \
            -srcfolder /tmp/nexel-dmg \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            Nexel-${{ github.ref_name }}-macOS-x64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-macOS-x64
          path: Nexel-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'
          arch: 'win64_msvc2019_64'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SQLite via vcpkg
        run: |
          vcpkg install sqlite3:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          cd native
          New-Item -ItemType Directory -Force -Path build | Out-Null
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"

      - name: Build
        run: cmake --build native/build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Install
        run: cmake --install native/build --prefix native/install --config Release

      - name: Deploy Qt DLLs
        run: |
          $exePath = Get-ChildItem -Path native/install -Recurse -Filter "NativeSpreadsheet.exe" | Select-Object -First 1
          if ($exePath) {
            windeployqt $exePath.FullName --release --no-translations
          }

      - name: Create portable package
        run: |
          # Create a clean distribution folder
          $distDir = "Nexel-${{ github.ref_name }}-Windows-x64"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null

          # Copy installed files
          if (Test-Path "native/install/bin") {
            Copy-Item -Path "native/install/bin/*" -Destination $distDir -Recurse
          } else {
            Copy-Item -Path "native/install/*" -Destination $distDir -Recurse
          }

          # Rename exe to Nexel.exe
          $exe = Get-ChildItem -Path $distDir -Filter "NativeSpreadsheet.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            Rename-Item -Path $exe.FullName -NewName "Nexel Pro.exe"
          }

          Compress-Archive -Path "$distDir/*" -DestinationPath "Nexel-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-Windows-x64
          path: Nexel-*.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libsqlite3-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev libx11-xcb-dev \
            libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev \
            libxcb1-dev libxcb-cursor-dev \
            libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev \
            libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libdbus-1-dev \
            fuse libfuse2

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtcharts'

      - name: Configure
        run: |
          cd native
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build native/build --config Release -j$(nproc)

      - name: Install
        run: |
          mkdir -p ${{ github.workspace }}/AppDir
          DESTDIR=${{ github.workspace }}/AppDir cmake --install native/build
          echo "=== Install contents ==="
          find ${{ github.workspace }}/AppDir -type f | head -20

      - name: Create portable package
        run: |
          # Create desktop file
          mkdir -p AppDir/usr/share/applications
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=Nexel Pro' 'Comment=High-performance native spreadsheet application' 'Exec=NativeSpreadsheet' 'Icon=nexel' 'Categories=Office;Spreadsheet;' > AppDir/usr/share/applications/nexel.desktop

          # Create minimal icon
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (256, 256), '#1A7A5A')
          d = ImageDraw.Draw(img)
          d.text((90, 60), 'N', fill='white')
          img.save('AppDir/usr/share/icons/hicolor/256x256/apps/nexel.png')
          " 2>/dev/null || \
          convert -size 256x256 xc:"#1A7A5A" -gravity center \
            -fill white -font Helvetica-Bold -pointsize 80 \
            -annotate 0 "N" \
            AppDir/usr/share/icons/hicolor/256x256/apps/nexel.png 2>/dev/null || \
          printf '\x89PNG\r\n\x1a\n' > AppDir/usr/share/icons/hicolor/256x256/apps/nexel.png

          # Try AppImage first
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage || true
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage || true
          chmod +x linuxdeploy*.AppImage 2>/dev/null || true

          export QMAKE=$Qt6_DIR/bin/qmake
          export LD_LIBRARY_PATH=$Qt6_DIR/lib:$LD_LIBRARY_PATH

          if [ -f linuxdeploy-x86_64.AppImage ]; then
            ./linuxdeploy-x86_64.AppImage \
              --appdir AppDir \
              --plugin qt \
              --output appimage \
              --desktop-file AppDir/usr/share/applications/nexel.desktop || true
            mv *.AppImage Nexel-${{ github.ref_name }}-Linux-x86_64.AppImage 2>/dev/null || true
          fi

          # Fallback: create tar.gz if AppImage failed
          if [ ! -f Nexel-*-Linux-*.AppImage ]; then
            echo "AppImage failed, creating tar.gz fallback"
            tar -czf Nexel-${{ github.ref_name }}-Linux-x86_64.tar.gz -C AppDir usr/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexel-Linux-x64
          path: |
            Nexel-*-Linux-*

  create-release:
    needs: [build-macos, build-macos-x64, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nexel Pro ${{ github.ref_name }}"
          body: |
            ## Nexel Pro ${{ github.ref_name }}

            High-performance native spreadsheet — handles millions of rows.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Nexel-${{ github.ref_name }}-macOS-arm64.dmg` |
            | macOS (Intel) | `Nexel-${{ github.ref_name }}-macOS-x64.dmg` |
            | Windows (64-bit) | `Nexel-${{ github.ref_name }}-Windows-x64.zip` |
            | Linux (64-bit) | `Nexel-${{ github.ref_name }}-Linux-x86_64.AppImage` |

            ### Highlights
            - **402 Formula Functions** — Math, Stats, Financial, Engineering, Dynamic Arrays, LAMBDA
            - **Excel-Exact UX** — Marching ants, selection behavior, keyboard navigation, Name Box
            - **Multi-Level Sort** — Up to 4 sort keys with headers option
            - **Sheet Protection** — Password-protected locked cells with enforcement
            - **Row/Column Grouping** — 8 outline levels with expand/collapse
            - **Multiline Cells** — Option+Return for in-cell line breaks
            - **HTML Paste** — Paste tables from browsers directly into cells
            - **10 Chart Types** — Column, Bar, Line, Pie, Scatter, Area, Donut, Histogram, Combo, Waterfall
            - **Deep Customization** — Trendlines, data labels, axis formatting, sparklines
            - **Conditional Formatting** — Data bars, color scales, icon sets, 18 condition types
            - **20M+ Row Support** — Virtual scrolling with columnar storage
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
